name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint Python ────────────────────────────────────────────────────────────
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check scripts streamlit_app

      - name: Ruff format check
        run: ruff format --check scripts streamlit_app

  # ── Parse & test dbt (no DB connection — just syntactic) ──────────────────
  dbt-parse:
    name: dbt parse + compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt
        run: |
          pip install dbt-core dbt-postgres
          dbt --version

      - name: Install dbt packages
        working-directory: dbt_project
        run: dbt deps

      - name: dbt parse (validates SQL syntax + project structure, no DB)
        working-directory: dbt_project
        env:
          # CI doesn't connect to a real DB — use dummy values that satisfy
          # profiles.yml's env_var() calls. We use `parse` rather than
          # `compile` because compile attempts a database connection in
          # dbt-core 1.11+ even when nothing is being run.
          NEON_HOST: localhost
          NEON_USER: dummy
          NEON_PASSWORD: dummy
          NEON_DBNAME: dummy
        run: dbt parse --profiles-dir .
