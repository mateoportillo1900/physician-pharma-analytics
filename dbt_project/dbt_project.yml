# ──────────────────────────────────────────────────────────────────────────────
# physician-pharma-analytics — dbt project
#
# Star-schema analytics warehouse over CMS Open Payments + Medicare Part D data,
# answering the published research question: do physicians who receive pharma
# payments prescribe more of that company's drugs?
# ──────────────────────────────────────────────────────────────────────────────

name: 'pharma_analytics'
version: '1.0.0'
config-version: 2

profile: 'pharma_analytics'

# ── Paths ────────────────────────────────────────────────────────────────────
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# ── Model configuration ──────────────────────────────────────────────────────
# Storage-conscious materialization for Neon free tier (512 MB cap):
#   • staging/intermediate: views (cheap, always fresh)
#   • mart dimensions: views by default — most are large pass-throughs that
#     don't need duplicating
#   • mart small lookups (dim_drug, dim_company): tables — they're tiny and
#     get joined to often
#   • mart aggregated fact (fact_payment_prescribing): table — small
#     aggregation, queried heavily
models:
  pharma_analytics:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    mart:
      +materialized: view
      +schema: mart
      # Materialize the dims only. We tried to materialize
      # fact_payment_prescribing as a table but Neon's free-tier compute
      # times out the FULL OUTER JOIN at 10 min before the CREATE TABLE
      # AS finishes. Solution: pages that need fast payment lookups
      # (KOL Finder) query int_physician_payments_agg directly rather
      # than going through the heavy fact_payment_prescribing view.
      dim_drug:
        +materialized: table
      dim_company:
        +materialized: table
      dim_physician:
        +materialized: table
      # Materialize the bridge as a table so KOL Finder doesn't chain
      # 3 views back to raw.open_payments on every click. Small (~30 MB,
      # ~250K rows) so it fits within Neon's 512 MB cap.
      bridge_physician_company_payments:
        +materialized: table
      # Same reason for fact_prescriptions: every page that filters by
      # therapeutic_class was scanning 1.5M rows through 3 chained views.
      # As a table with implicit FK clustering, lookups are ~constant time.
      fact_prescriptions:
        +materialized: table
